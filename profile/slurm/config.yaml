# Snakemake 8 SLURM executor profile
# ------------------------------------
# Install the executor plugin first:
#   pip install snakemake-executor-plugin-slurm
#
# Submit the workflow with:
#   sbatch run_slurm.sh
# or interactively:
#   snakemake all_pgs --profile profile/slurm

executor: slurm

# Default resources applied to every job unless overridden below.
default-resources:
  slurm_partition: compute
  slurm_account: math
  mem_mb: 4000
  runtime: 360        # minutes (6 h)
  cpus_per_task: 1
  slurm_jobname: "'smk_' + rule"

# Maximum simultaneous SLURM jobs submitted by Snakemake.
jobs: 800

# Seconds Snakemake waits for output files to appear on the shared filesystem.
latency-wait: 60

# Re-run any jobs whose output files are incomplete (e.g. from a cancelled run).
rerun-incomplete: true

# Per-rule resource overrides.
# These supplement (or override) the resources already declared in the Snakefile.
set-resources:
  # Genotype simulation — memory-intensive coalescent over full genome
  simulate_msprime:
    mem_mb: 16000
    runtime: 1440     # 24 h — 22 chromosomes × 2 cohorts

  # HAPGEN2 simulation (if enabled)
  simulate_hapgen2:
    mem_mb: 8000
    runtime: 480      # 8 h

  # HAPNEST simulation — one job per (rep, chrom), all run in parallel on SLURM
  simulate_hapnest:
    mem_mb: 32000
    runtime: 480      # 8 h
    cpus_per_task: 4

  # VCF → PLINK conversion — 168k HAPNEST individuals needs more than 16 GB
  merge_and_convert:
    mem_mb: 64000
    runtime: 480      # 8 h

  # 1KG population extraction — concatenates all 22 chromosomes
  extract_1kg_population:
    mem_mb: 16000
    runtime: 480      # 8 h

  # LD reference computation — most memory-intensive step (SFBM build)
  prepare_ldpred2_ref:
    mem_mb: 64000
    runtime: 1440     # 24 h
    cpus_per_task: 4

  # GWAS PCA — 80k training individuals; approx randomized SVD avoids n×n GRM
  run_pca_gwas:
    mem_mb: 8000
    runtime: 480      # 8 h (was 2 h for chr22 only; now full genome)
    cpus_per_task: 4

  # Test-set PCA projection — scoring only, low memory
  project_pca_test:
    mem_mb: 8000
    runtime: 120      # 2 h

  # GWAS — one job per chromosome, 80k training individuals
  run_gwas_chrom:
    mem_mb: 16000
    runtime: 180      # 3 h per chromosome

  # PRS-CS LD reference — one job per chromosome (parallelised)
  build_prscs_ref_chrom:
    runtime: 480      # 8 h — large chromosomes with max panel (50k) can be slow

  # Merge per-chromosome PRS-CS refs — just cp + cat, minimal resources
  merge_prscs_ref:
    mem_mb: 1000
    runtime: 30

  # PRS-CS weight computation
  run_prscs:
    mem_mb: 4000
    runtime: 720      # 12 h (was 6 h for chr22 only; now full genome)

  # Hapnest public VCF extraction — plink2 uses 4 threads
  extract_hapnest_public_vcf:
    mem_mb: 16000
    runtime: 360
    cpus_per_task: 4

  # PGS posterior variance scoring — loads GWAS BED + SFBM into R
  score_pgs_variance:
    mem_mb: 32000
    runtime: 480      # 8 h (full-genome SFBM; scale with cpus_per_task if slow)
    cpus_per_task: 8

# Simulation study configuration
# --------------------------------
# Chromosomes to simulate. Use a short list (e.g. [chr21, chr22]) for test runs.
chromosomes:
  - chr22

# Number of simulation replicates
n_replicates: 1

# Base random seed. Replicate k uses seed = base_seed + k.
base_seed: 1000

# Sample sizes (diploid individuals)
n_gwas: 100000
n_target: 5000
n_panel_max: 50000

# Minor allele frequency threshold applied when filtering VCFs
maf_threshold: 0.01

# Fraction of GWAS individuals to use as the training (discovery) set.
# The remainder becomes the test (evaluation) set.
train_frac: 0.80

# Path to HapMap3 SNP positions (required for HAPGEN2 reference filtering).
# Required columns (with header): chrom  pos
#   chrom – integer chromosome number (no 'chr' prefix), e.g. 21
#   pos   – 1-based GRCh37 position
hapmap3_sites_file: "resources/hapmap3_sites.tsv"

# ── Simulation methods ────────────────────────────────────────────────────────
# Which genotype simulation methods to run.
#   msprime – AmericanAdmixture_4B11 coalescent with HapMap3-anchored mutations
#   hapgen2 – forward simulation from 1KG Phase 3 reference haplotypes
#   hapnest – LD-preserving haplotype copying from 1KG+HGDP reference
sim_methods:
  - hapnest_public

# ── HAPNEST settings ──────────────────────────────────────────────────────────

# Path to the HAPNEST Singularity container image.
# Download with: singularity pull docker://sophiewharrie/intervene-synthetic-data
hapnest_container: "resources/hapnest/intervene-synthetic-data_latest.sif"

# Directory populated by: singularity exec ... fetch
# Must contain inputs/raw/ and inputs/processed/ subdirectories.
hapnest_data_dir: "resources/hapnest/data"

# Superpopulation to use as the HAPNEST haplotype reference.
# One of: AFR, AMR, EAS, EUR, CSA, MID
# Three separate runs (AMR, EUR, AFR) are used to simulate the three
# HAPNEST panel ancestries; this default is for the matched panel.
hapnest_superpopulation: "AMR"

# Set to true to run HAPNEST via Docker instead of Singularity.
# Docker: docker run --rm -v {data_dir}:/data/ {image} generate_geno ...
# Singularity: singularity exec --bind {data_dir}:/data/ {sif} generate_geno ...
# Use true on Windows/WSL2 (Docker Desktop); false on Linux clusters (Singularity).
hapnest_use_docker: false

# Local path where the HAPNEST Julia repo is cloned.
# Rules download_hapnest and install_hapnest populate this directory once.
hapnest_repo: "resources/hapnest/repo"

# ── HAPGEN2 / 1000 Genomes reference panel ────────────────────────────────────

# Super-population to use as HAPGEN2 haplotype reference panel.
# Options: AMR (MXL, PUR, CLM, PEL; n≈347)
#          EUR (CEU, TSI, FIN, GBR, IBS; n≈503)
#          AFR (YRI, LWK, GWD, MSL, ESN, ASW, ACB; n≈661)
#          SAS (GIH, PJL, BEB, STU, ITU; n≈489)
#          EAS (CHB, JPT, CHS, CDX, KHV; n≈504)
ref_panel_population: "AMR"

# Effective population size passed to HAPGEN2 via -Ne.
hapgen2_ne: 11418

# Base URL for 1KG Phase 3 genetic maps (Oxford stats server).
# Genetic maps: {kg3_base_url}/genetic_map_chr{N}_combined_b37.txt
# Note: the .haps.gz files were removed from this server; phased VCFs are
# now downloaded from EBI FTP (http://ftp.1000genomes.ebi.ac.uk/vol1/ftp/release/20130502).
kg3_base_url: "https://mathgen.stats.ox.ac.uk/impute/1000GP_Phase3"

# ── Panel size & ancestry parameters ─────────────────────────────────────────

# Panel sizes (number of individuals) to evaluate.
# All HAPNEST public panels support sizes up to n_panel_max.
panel_sizes:
  - 500
  - 5000
  - 50000

# Panel ancestries to evaluate (all drawn from the HAPNEST public dataset):
#   hapnest_AMR – matched-ancestry panel; independent AMR subjects not in the GWAS
#   hapnest_AFR – ancestry-mismatched panel; all AFR subjects in the public file
#   hapnest_EUR – ancestry-mismatched panel; all EUR subjects in the public file
#   hapnest_EAS – ancestry-mismatched panel; all EAS subjects in the public file
#   hapnest_CSA – ancestry-mismatched panel; all CSA subjects in the public file
#   hapnest_MID – ancestry-mismatched panel; all MID subjects in the public file
panel_ancestries:
  - hapnest_AMR
  - hapnest_AFR
  - hapnest_EUR
  - hapnest_EAS
  - hapnest_CSA
  - hapnest_MID

# PGS methods to run.
pgs_methods:
  - ldpred2
  - prscs

# Number of PCs to include as GWAS covariates (and in the evaluation models).
n_pcs: 20

# EBI FTP base URL for 1KG Phase 3 phased VCFs.
kg3_ebi_url: "http://ftp.1000genomes.ebi.ac.uk/vol1/ftp/release/20130502"

# ── Phenotype simulation parameters ──────────────────────────────────────────

# SNP heritability levels (liability scale)
h2_levels:
  - 0.05
  - 0.10
  - 0.20
  - 0.40

# Proportion of causal SNPs
#   Note: ignored when effect_dist == gaussian (infinitesimal model uses all SNPs)
p_causal_levels:
  - 0.001
  - 0.01
  - 0.05
  - 0.20

# Effect-size distributions
#   gaussian  – infinitesimal: all SNPs have N(0, h²/p) effects
#               (p_causal is ignored under the gaussian model)
#   spikeslab – sparse normal: p_causal fraction get N(0, h²/(p·p_causal)) effects
effect_dists:
  - gaussian
  - spikeslab

# Trait configurations: label -> {type, prevalence}
#   type       – quantitative | binary
#   prevalence – used only for binary (liability-threshold model); null for quantitative
trait_configs:
  quantitative:
    type: quantitative
    prevalence: null
  binary_prev10:
    type: binary
    prevalence: 0.10
  binary_prev30:
    type: binary
    prevalence: 0.30

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460"
     font-family="Lato, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main pipeline boxes -->
  <g filter="url(#shadow)">
    <!-- GWAS cohort -->
    <rect x="20"  y="70" width="210" height="100" rx="12"
          fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
    <text x="125" y="110" text-anchor="middle" font-size="20"
          font-weight="600" fill="#111827">GWAS cohort</text>
    <text x="125" y="138" text-anchor="middle" font-size="14"
          fill="#6b7280">N_gwas individuals</text>

    <!-- marginal beta -->
    <rect x="275" y="70" width="210" height="100" rx="12"
          fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
    <!-- β character -->
    <text x="368" y="115" text-anchor="middle" font-size="26"
          font-weight="600" font-style="italic" fill="#111827">β</text>
    <!-- explicit hat above β -->
    <path d="M 360,93 L 368,86 L 376,93"
          stroke="#111827" stroke-width="2.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- marg superscript -->
    <text x="380" y="104" text-anchor="start" font-size="13"
          font-weight="600" fill="#111827">marg</text>

    <text x="380" y="142" text-anchor="middle" font-size="14"
          fill="#6b7280">marginal summary statistics</text>

    <!-- LDpred2 / PRS-CS -->
    <rect x="530" y="70" width="210" height="100" rx="12"
          fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.8"/>
    <text x="635" y="105" text-anchor="middle" font-size="20"
          font-weight="600" fill="#1e3a8a">LDpred2 / PRS-CS</text>
    <text x="635" y="135" text-anchor="middle" font-size="14"
          fill="#1e40af">posterior β with LD adjustment</text>

    <!-- final PGS -->
    <rect x="785" y="70" width="195" height="100" rx="12"
          fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
    <text x="882" y="110" text-anchor="middle" font-size="20"
          font-weight="600" fill="#111827">Final PGS</text>
    <text x="882" y="138" text-anchor="middle" font-size="14"
          fill="#6b7280">per individual</text>
  </g>

  <!-- Pipeline arrows -->
  <line x1="232" y1="120" x2="273" y2="120" stroke="#374151"
        stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="487" y1="120" x2="528" y2="120" stroke="#374151"
        stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="742" y1="120" x2="783" y2="120" stroke="#374151"
        stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LD reference panel callout -->
  <g filter="url(#shadow)">
    <rect x="450" y="290" width="370" height="130" rx="14"
          fill="#fef3c7" stroke="#b45309" stroke-width="2"
          stroke-dasharray="7 4"/>
    <text x="635" y="328" text-anchor="middle" font-size="22"
          font-weight="700" fill="#7c2d12">LD reference panel</text>
    <text x="635" y="360" text-anchor="middle" font-size="16"
          fill="#7c2d12">Which ancestry?  How many individuals?</text>

    <!-- "?" badge -->
    <circle cx="775" cy="312" r="22" fill="#b45309" stroke="#7c2d12"
            stroke-width="1.5"/>
    <text x="775" y="321" text-anchor="middle" font-size="28"
          font-weight="700" fill="#fef3c7">?</text>
  </g>

  <!-- Arrow from panel up to LDpred2 / PRS-CS box -->
  <line x1="635" y1="288" x2="635" y2="172" stroke="#b45309"
        stroke-width="2.5" marker-end="url(#arrow-accent)"/>
  <text x="650" y="235" font-size="15" font-style="italic"
        fill="#7c2d12">supplies </text>
  <text x="715" y="235" font-size="16" font-weight="700"
        font-style="italic" fill="#7c2d12">R</text>
  <path d="M 711,221 L 718,215 L 725,221"
        stroke="#7c2d12" stroke-width="1.8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
